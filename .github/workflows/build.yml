name: Gerar Executavel e Release Windows

on:
  push:
    tags:
      - 'v*' # Roda apenas quando você enviar uma tag que comece com "v" (ex: v1.0.0)

jobs:
  build-and-release:
    runs-on: windows-latest
    
    # Permissão OBRIGATÓRIA para o bot do GitHub poder criar a Release
    permissions:
      contents: write 

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic pystray pillow pywin32 requests pyinstaller

    - name: Gerar o EXE
      run: |
        pyinstaller --onefile --noconsole --name "Agente_Impressao" servidor_impressao.py

    - name: Publicar Release Oficial
      uses: softprops/action-gh-release@v2
      with:
        files: dist/Agente_Impressao.exe # Pega o arquivo gerado e anexa na Release
        generate_release_notes: true # Cria um textinho automático com o que mudou no código
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}