name: Gerar Executavel Windows

on:
  push:
    branches: [ "main" ] # Roda sempre que você enviar código para a main

jobs:
  build:
    runs-on: windows-latest # Usa um servidor Windows de verdade!

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4 # Atualizado para v4

    - name: Configurar Python
      uses: actions/setup-python@v5 # Atualizado para v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic pystray pillow pywin32 requests pyinstaller

    - name: Gerar o EXE
      run: |
        pyinstaller --onefile --noconsole --name "Agente_Impressao" servidor_impressao.py

    - name: Salvar o Arquivo Final
      uses: actions/upload-artifact@v4 # Atualizado para v4 (Corrige o erro)
      with:
        name: Agente_Impressao_EXE
        path: dist/Agente_Impressao.exe